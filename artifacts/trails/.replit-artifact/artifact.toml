kind = "web"
previewPath = "/"
title = "Trails"
version = "1.0.0"
id = "artifacts/trails"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21220

[services.development]
run = "pnpm --filter @workspace/trails run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trails", "run", "build" ]
publicDir = "artifacts/trails/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21220"
BASE_PATH = "/"
